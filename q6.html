<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to reverse a given no and check if its spalindrome or not</title>
</head>
<body>
    <script>
        let number = prompt("Enter a number to check if it's a palindrome:");
        let reversedNumber = number.split('').reverse().join('');

        if (number === reversedNumber) {
            alert("The number " + number + " is a palindrome.");
        } else {
            alert("The number " + number + " is not a palindrome.");
        }
    </script>
    
</body>
</html>
