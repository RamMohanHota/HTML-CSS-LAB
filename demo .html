<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silicon University</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Importing another CSS inside external -->
  <style>

    /* 1) Universal Selector */
    * {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* 2) Type Selector */
    p {
      color: #444;
      line-height: 1.6;
      font-size: 16px;
    }

    /* 3) Class Selector */
    .footer-link {
      text-decoration: none;
      color: #2856a3;
      font-size: 16px;
    }

    .footer-link:hover {
      color: darkorange;
    }

    /* 4) ID Selector */
    #aboutus {
      background-color: #f0f8ff;
      padding: 20px;
      border-left: 4px solid #2856a3;
    }

    /* 5) Descendant Selector */
    #aboutus p {
      color: #666;
      font-style: italic;
    }

    /* 6) Multiple Selectors */
    nav a,
    .footer-link {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1 style="color: darkred;">Building technology for human progress</h1> <!-- 7) Inline CSS -->
  </header>

  <main>
    <section id="aboutus">
      <h2>About Us</h2>
      <p>We are a university advancing science and technology education for students from all walks of life.</p>
    </section>

    <nav>
      <ul>
        <li><a href="#">ACADEMICS</a></li>
        <li><a href="#">ADMISSIONS</a></li>
        <li><a href="#">PLACEMENTS</a></li>
      </ul>
    </nav>
  </main>
</body>
</html>
