<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>generate first n fibonacci numbers</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter the number of Fibonacci numbers to generate:"));
        let fib = [0, 1];

        for (let i = 2; i < n; i++) {
            fib[i] = fib[i - 1] + fib[i - 2];
        }

        alert("The first " + n + " Fibonacci numbers are: " + fib.slice(0, n).join(", ") + ".");
        </script>
</body>
</html>
