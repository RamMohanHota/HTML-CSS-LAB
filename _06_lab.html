<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silicon University Example</title>
    <style>
        .bada {
            display: flex;
            gap: 30px; 
        }
        .text-div, .logo-div {
            width: 200px;
            height: 100px;
            padding: 20px;
            background: #f5faff; 
            border: 5px solid #eb5606; 
            margin: 50px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .text-div {
            font-size: 2em;
            font-weight: bold;
        }
        .logo-div img {
            max-width: 150px;
            max-height: 50px;
        }
        .text-div {
            font-size: 2em;
            font-weight: bold;
            background-clip: padding-box;
            background-color: #14e43a;
}
    </style>
</head>
<body style="background-color: #1a7dd9;">
    <div class="bada">
        <div class="text-div">
            Silicon University
        </div>
        <div class="logo-div">
            <img src="https://silicon.ac.in/wp-content/themes/sit/assets/img/logo-7.png"
                 alt="Silicon University Logo">
        </div>
    </div>
</body>
</html>
