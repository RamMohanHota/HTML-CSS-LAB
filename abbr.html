<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blockquote Example</title>
</head>
<body>
    <h2 style="text-align: center;">Example of blockquote</h2>
    <blockquote style="text-align: center;">
        At the end of the day you are solely responsible for your success and failure.
        <br>
        <abbr title="SILICON UNIVERSITY">SU</abbr>
    </blockquote>
</body>
</html>
