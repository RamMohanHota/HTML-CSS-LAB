<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Big Box with 5 Inner Boxes</title>
    <style>
        .big-box {
            width: 600px;
            height: 300px;
            background: #e3e6f3;
            border: 4px solid #2856a3;
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 40px auto;
            padding: 20px;
        }
        .small-box {
            width: 80px;
            height: 80px;
            background: #fffbe7;
            border: 3px solid #eb5606;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: #2856a3;
            
        }
    </style>
</head>
<body>
    <div class="big-box">
        <div class='small-box' style="order: 3;">A</div>
        <div class='small-box' style="order: 1; flex-grow: calc(5)">B</div>
        <div class='small-box' style="order: 5">C</div>
        <div class='small-box' style="order: 2">D</div>
        <div class='small-box' style="order: 4">E</div>
        
    </div>
</body>
</html>
