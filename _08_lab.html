<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="title">Our Products </h1>

  <div class="card-container">
    <!-- Card 1 -->
    <div class="card">
      <img src="https://rukminim2.flixcart.com/image/240/240/xif0q/mobile/l/x/1/-original-imahdv5ttyhhyhg9.jpeg?q=60" alt="Product 1">
      <h2>Product 1</h2>
      <p>This is a very good motorola phone .</p>
      <p>15 GB RAM , 750 GB ROM</p>
      <span class="price">Rs 25000/-</span>
      <button style="background-color: aquamarine;">Add to Cart</button>
    </div>


    <!-- Card 2 -->
    <div class="card">
      <img src="https://rukminim2.flixcart.com/image/420/420/xif0q/power-bank/o/2/a/-original-imahdthbvkfxrdnf.jpeg?q=60" alt="Product 2">
      <h2>Product 2</h2>
      <p>This is a boat powerbank.</p>
      <p>7000 Mah battery , alluminium finish</p>
      <span class="price">Rs 7000/-</span>
      <button style="background-color: aquamarine;">Add to Cart</button>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <img src="https://rukminim2.flixcart.com/image/420/420/xif0q/headphone/j/4/y/black-earbuds-with-premium-quality-sound-hectic-original-imahdmngx2vamnkg.jpeg?q=60" alt="Product 3">
      <h2>Product 3</h2>
      <p>This is a bluetooth earbuds.</p>
      <span class="price">Rs 4000/-</span>
      <button style="background-color: aquamarine;">Add to Cart</button>
    </div>
  </div>
</body> 
</html>
